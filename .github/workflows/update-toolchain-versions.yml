name: Update Toolchain Versions

on:
    schedule:
        - cron: "0 21 * * *"
    workflow_dispatch:

concurrency:
    group: update-toolchain-versions
    cancel-in-progress: false

jobs:
    update:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/tree/v6

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # https://github.com/actions/setup-node/tree/v6
              with:
                  node-version: 24

            - name: Update toolchain versions
              id: update-toolchain
              run: node .github/scripts/update-toolchain-versions.js

            - name: Create Pull Request
              if: ${{ steps.update-toolchain.outputs.changed == 'true' }}
              uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # https://github.com/peter-evans/create-pull-request/tree/v8
              with:
                  token: ${{ secrets.PR_WORKFLOW_TOKEN || github.token }}
                  commit-message: "chore(github): update node and pnpm versions"
                  title: "chore(github): update node and pnpm versions"
                  body: |
                      This PR updates the repository toolchain versions tracked in:
                      - `package.json`
                      - `ui/package.json`
                      - GitHub workflows that bootstrap Node.js and pnpm directly

                      Releases are only considered eligible after a 1 day delay, matching the repository's Dependabot cooldown.

                      Resolved by automation:
                      - Node.js major: `${{ steps.update-toolchain.outputs.node_major }}`
                      - pnpm version: `${{ steps.update-toolchain.outputs.pnpm_version }}`
                  branch: chore/update-toolchain-versions
                  delete-branch: true
                  labels: dependencies
