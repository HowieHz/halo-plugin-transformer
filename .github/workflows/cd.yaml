name: CD

on:
  release:
    types:
      - published

jobs:
  prepare:
    name: Prepare Release Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Resolve Release Metadata
        id: meta
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          RELEASE_VERSION="${RELEASE_TAG#v}"
          if ! [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use stable vX.Y.Z format, got: $RELEASE_TAG" >&2
            exit 1
          fi

          PREVIOUS_TAG=$(git tag --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -Fxv "$RELEASE_TAG" | sort -V | tail -n 1)
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous stable release tag found before $RELEASE_TAG" >&2
            exit 1
          fi

          RELEASE_DATE=$(TZ=Asia/Shanghai date -d "${{ github.event.release.published_at }}" +%F)
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous_version=${PREVIOUS_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "release_date=$RELEASE_DATE" >> "$GITHUB_OUTPUT"

      - name: Promote Changelog Entry
        run: node .github/scripts/prepare-changelog-release.js "${{ steps.meta.outputs.release_version }}" "${{ steps.meta.outputs.previous_version }}" "${{ steps.meta.outputs.release_date }}"

      - name: Commit Release Changelog
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs(changelog): sync ${{ steps.meta.outputs.release_version }} release"
          git push origin HEAD:${{ github.event.repository.default_branch }}

  cd:
    needs: prepare
    uses: halo-sigs/reusable-workflows/.github/workflows/plugin-cd.yaml@574420d846900eb5e6b25af72d43dca475583eac # https://github.com/halo-sigs/reusable-workflows/tree/v4
    secrets:
      halo-pat: ${{ secrets.HALO_PAT }}
    permissions:
      contents: write
    with:
      ui-path: "ui"
      pnpm-version: "10.33.0"
      node-version: 24
      java-version: 21
      app-id: app-xxxxxxxx